<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PicTube — Sign In</title>

  <!-- Google Font: Inter for clean, modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- All login-specific styles are inlined here for portability -->
  <style>
    /* ─── CSS RESET & VARIABLES ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-gradient-start: #0f0c1a;
      --bg-gradient-end:   #1a1035;
      --accent:            #e63950;   /* crimson red — PicTube brand */
      --accent-hover:      #ff4d6a;
      --accent-glow:       rgba(230, 57, 80, 0.35);
      --glass-bg:          rgba(255, 255, 255, 0.06);
      --glass-border:      rgba(255, 255, 255, 0.12);
      --text-primary:      #f0f0f5;
      --text-secondary:    #9a96b0;
      --input-bg:          rgba(255, 255, 255, 0.08);
      --input-border:      rgba(255, 255, 255, 0.15);
      --input-focus:       rgba(230, 57, 80, 0.5);
      --error-color:       #ff6b6b;
      --success-color:     #4ade80;
      --font-body:         'Inter', sans-serif;
      --font-display:      'Outfit', sans-serif;
      --radius:            14px;
      --transition:        0.25s ease;
    }

    /* ─── BODY & BACKGROUND ─────────────────────────────────── */
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      /* Animated background blobs for visual depth */
      position: relative;
      overflow: hidden;
    }

    /* Decorative blurred background orbs (pure CSS) */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #e63950, transparent 70%);
      top: -80px; left: -80px;
      animation: floatOrb 8s ease-in-out infinite;
    }
    body::after {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #6c5ce7, transparent 70%);
      bottom: -60px; right: -60px;
      animation: floatOrb 10s ease-in-out infinite reverse;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(20px, 20px); }
    }

    /* ─── GLASSMORPHIC CARD ─────────────────────────────────── */
    /* Glassmorphism: semi-transparent bg + blur + subtle border */
    .login-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);       /* the "frosted glass" blur */
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      /* Entrance animation */
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── LOGO / BRAND ──────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    /* The PicTube "play" icon badge */
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .brand-icon svg { fill: white; }

    .brand-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .brand-name span { color: var(--accent); }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      margin-top: 0.25rem;
    }

    /* ─── FORM ──────────────────────────────────────────────── */
    .login-form { display: flex; flex-direction: column; gap: 1.1rem; }

    /* Each label + input lives in a .field-group */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* Wrapper needed so we can absolutely-position icons inside the input */
    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: var(--radius);
      padding: 0.75rem 2.8rem 0.75rem 1rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-wrapper input::placeholder { color: var(--text-secondary); opacity: 0.6; }

    /* Focus ring using accent color */
    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    /* Error state */
    .input-wrapper input.input-error {
      border-color: var(--error-color);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.2);
    }

    /* Show/hide password button positioned inside the input */
    .toggle-password {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color var(--transition);
    }
    .toggle-password:hover { color: var(--text-primary); }

    /* Inline field error messages */
    .field-error {
      font-size: 0.78rem;
      color: var(--error-color);
      min-height: 1rem; /* reserve space to prevent layout shift */
    }

    /* Forgot password link */
    .forgot-link {
      text-align: right;
      font-size: 0.8rem;
      margin-top: -0.5rem;
    }
    .forgot-link a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--transition);
    }
    .forgot-link a:hover { color: var(--accent-hover); }

    /* ─── SUBMIT BUTTON ─────────────────────────────────────── */
    .login-btn {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 18px var(--accent-glow);
    }
    .login-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .login-btn:active:not(:disabled) { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ─── DIVIDER ────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-secondary);
      font-size: 0.8rem;
      margin: 0.25rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    /* ─── SIGN UP PROMPT ─────────────────────────────────────── */
    .signup-prompt {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .signup-prompt a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition);
    }
    .signup-prompt a:hover { color: var(--accent-hover); }

    /* ─── AUTH TOAST ─────────────────────────────────────────── */
    /* Small snackbar notification for login feedback */
    .auth-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .auth-toast--visible { opacity: 1; transform: translateY(0); }
    .auth-toast--success { background: #1a7a4a; border-left: 4px solid var(--success-color); }
    .auth-toast--error   { background: #7a1a1a; border-left: 4px solid var(--error-color); }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; border-radius: 18px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       GLASSMORPHIC LOGIN CARD
  ══════════════════════════════════════════════════════════ -->
  <div class="login-card" role="main">

    <!-- Brand Logo -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <!-- Camera / play icon -->
        <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M23 7L16 12L23 17V7Z"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <span class="brand-name">Pic<span>Tube</span></span>
    </div>
    <p class="login-subtitle">Sign in to explore, share, and discover stunning images.</p>

    <!-- Login Form -->
    <!-- The id="login-form" is hooked in auth.js via addEventListener -->
    <form class="login-form" id="login-form" novalidate>

      <!-- Email / Username Field -->
      <div class="field-group">
        <label for="email">Email or Username</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="username"
            aria-required="true"
            aria-describedby="email-error"
          />
        </div>
        <!-- Error message is injected here by auth.js -->
        <span class="field-error" id="email-error" role="alert"></span>
      </div>

      <!-- Password Field -->
      <div class="field-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            autocomplete="current-password"
            aria-required="true"
            aria-describedby="password-error"
          />
          <!-- Show / Hide Password Toggle -->
          <button
            type="button"
            class="toggle-password"
            id="toggle-password"
            aria-label="Toggle password visibility"
            title="Show / hide password"
          >
            <!-- Eye icon (default = password hidden) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="password-error" role="alert"></span>
      </div>

      <!-- Forgot Password -->
      <div class="forgot-link">
        <a href="#" onclick="return false;">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-btn" id="login-btn">
        Sign In
      </button>

      <!-- Divider -->
      <div class="divider" aria-hidden="true">or</div>

      <!-- Sign Up Prompt -->
      <p class="signup-prompt">
        New to PicTube?
        <a href="#" onclick="return false;">Create an account</a>
      </p>

    </form>
  </div>

  <!-- Load authentication logic -->
  <script src="auth.js"></script>
</body>
</html>
