<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PicTube — Discover Stunning Images</title>

  <!-- Google Fonts: Inter (body) + Outfit (display headings) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- All global styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     FIXED HEADER / NAVIGATION BAR
     ════════════════════════════════════════════════════════════ -->
<header class="header" role="banner">

  <!-- Mobile hamburger button (hidden on desktop via CSS) -->
  <button class="hamburger-btn icon-btn" id="hamburger-btn"
          aria-label="Open navigation menu" aria-expanded="false">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Logo -->
  <a class="logo" href="index.html" aria-label="YouTube Home">
    <div class="logo-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M23 7L16 12L23 17V7Z"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
    </div>
    <span class="logo-text">You<span>Tube</span></span>
  </a>

  <!-- Search Bar + Voice Search -->
  <div class="search-container">
    <div class="search-wrapper" role="search">
      <label class="visually-hidden" for="search-input">Search videos</label>
      <input
        type="search"
        class="search-input"
        id="search-input"
        placeholder="Search videos, channels, categories..."
        autocomplete="off"
        aria-label="Search videos"
      />
      <button class="search-btn" aria-label="Submit search">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <button class="mic-btn" id="voice-search-btn" aria-label="Search with your voice" title="Search with your voice">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
  </div>

  <!-- Header Action Buttons (right side) -->
  <div class="header-actions">

    <!-- Upload Button -->
    <button class="upload-btn" id="upload-btn" aria-label="Upload image">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="btn-text">Upload</span>
    </button>

    <!-- Theme Toggle -->
    <div class="theme-toggle" role="group" aria-label="Theme switcher">
      <span class="theme-label" aria-hidden="true">
        <!-- Moon icon (dark mode) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
      <!-- The toggle track doubles as the clickable button -->
      <div class="toggle-track" id="theme-track" role="switch" aria-checked="false"
           aria-label="Toggle light/dark mode" tabindex="0">
        <div class="toggle-thumb"></div>
      </div>
      <span class="theme-label" aria-hidden="true">
        <!-- Sun icon (light mode) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </span>
    </div>

    <!-- Avatar / User Menu -->
    <div class="avatar-wrapper">
      <button class="avatar-btn" id="avatar-btn"
              aria-label="Open user menu" aria-expanded="false" aria-haspopup="menu">
        <img id="header-avatar-img"
             src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest"
             alt="Your profile avatar" />
      </button>

      <!-- Dropdown menu -->
      <div class="avatar-dropdown" id="avatar-dropdown" role="menu" aria-label="User menu">
        <!-- User info header -->
        <div class="dropdown-user-info">
          <p class="username" id="dropdown-username">Loading…</p>
          <p class="user-email" id="dropdown-email"></p>
        </div>

        <button class="dropdown-item" role="menuitem">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Profile
        </button>

        <button class="dropdown-item" role="menuitem">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </button>

        <button class="dropdown-item danger" id="logout-btn" role="menuitem">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </div>

  </div><!-- /header-actions -->
</header>


<!-- ════════════════════════════════════════════════════════════
     PAGE LAYOUT (Sidebar + Main Content)
     ════════════════════════════════════════════════════════════ -->
<div class="page-layout">

  <!-- ── LEFT SIDEBAR ── -->
  <nav class="sidebar" id="sidebar" aria-label="Site navigation">

    <!-- Main Navigation -->
    <div class="sidebar-section-title">Explore</div>

    <button class="sidebar-item active" id="sidebar-home" aria-label="Home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>

    <button class="sidebar-item" id="sidebar-shorts" aria-label="Shorts">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/>
        <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/>
      </svg>
      <span>Shorts</span>
    </button>

    <button class="sidebar-item" id="sidebar-subscriptions" aria-label="Subscriptions">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>Subscriptions</span>
    </button>

    <div class="sidebar-divider" role="separator"></div>
    <div class="sidebar-section-title">You</div>

    <button class="sidebar-item" id="sidebar-library" aria-label="Library">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Library</span>
    </button>

    <button class="sidebar-item" id="sidebar-liked" aria-label="Liked Videos">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Liked Videos</span>
    </button>

    <button class="sidebar-item" id="sidebar-settings" aria-label="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </button>

  </nav><!-- /sidebar -->


  <!-- ── MAIN CONTENT ── -->
  <main class="main-content" id="main-content" role="main">

    <!-- Category Chip Bar -->
    <nav class="category-bar" id="category-bar" aria-label="Image categories"></nav>

    <!-- Section heading -->
    <h2 class="section-title" id="section-title">Discover Videos</h2>

    <!-- Image Grid — populated dynamically by app.js -->
    <div class="image-grid" id="image-grid" aria-label="Image feed" aria-live="polite"></div>

  </main>

</div><!-- /page-layout -->


<!-- Mobile sidebar overlay (dark backdrop) -->
<div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>


<!-- ════════════════════════════════════════════════════════════
     IMAGE DETAIL MODAL
     Hidden by default; opened when user clicks an image card.
     ════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="detail-modal" role="dialog" aria-modal="true"
     aria-labelledby="modal-title" aria-hidden="true">

  <div class="modal" id="detail-modal-inner">
    <!-- Close button -->
    <button class="modal-close" id="close-detail-modal" aria-label="Close video detail">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Two-column layout: video | details -->
    <div class="modal-layout">

      <!-- Left: Custom Video Player Container -->
      <div class="modal-image-pane">
        <div class="video-container" id="video-container">
          <video id="modal-video" src="" playsinline preload="auto"></video>
          
          <!-- Large center play indicator -->
          <div class="large-play-overlay" id="large-play-overlay">
            <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>

          <!-- Custom Controls overlay -->
          <div class="video-controls" id="video-controls">
            <!-- Progress Bar -->
            <div class="progress-bar-container" id="progress-container">
              <div class="progress-bar-hover-line"></div>
              <div class="progress-bar-buffered" id="progress-buffered"></div>
              <div class="progress-bar-elapsed" id="progress-elapsed"></div>
              <div class="progress-bar-scrubber" id="progress-scrubber"></div>
            </div>
            <!-- Control buttons -->
            <div class="controls-row">
              <div class="controls-left">
                <button class="player-control-btn" id="play-pause-btn" aria-label="Play">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" id="play-icon">
                    <path d="M8 5v14l11-7z"/>
                  </svg>
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" id="pause-icon" style="display:none">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                  </svg>
                </button>
                <div class="volume-container">
                  <button class="player-control-btn" id="mute-btn" aria-label="Mute">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" id="volume-icon">
                      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>
                  </button>
                  <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1" aria-label="Volume" />
                </div>
                <div class="time-display">
                  <span id="time-current">0:00</span> / <span id="time-duration">0:00</span>
                </div>
              </div>
              <div class="controls-right">
                <div class="speed-container">
                  <button class="player-control-btn" id="speed-btn" aria-label="Playback Speed">1.0x</button>
                  <div class="speed-menu" id="speed-menu">
                    <button class="speed-option" data-speed="0.5">0.5x</button>
                    <button class="speed-option active" data-speed="1.0">Normal</button>
                    <button class="speed-option" data-speed="1.5">1.5x</button>
                    <button class="speed-option" data-speed="2.0">2.0x</button>
                  </div>
                </div>
                <button class="player-control-btn" id="theater-btn" aria-label="Theater Mode" title="Theater Mode">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <rect x="2" y="4" width="20" height="16" rx="2" ry="2"/>
                  </svg>
                </button>
                <button class="player-control-btn" id="fullscreen-btn" aria-label="Fullscreen" title="Fullscreen">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Details + Interactions + Comments -->
      <div class="modal-details-pane">

        <!-- Category tag -->
        <span class="modal-category-tag" id="modal-category-tag"></span>

        <!-- Title -->
        <h2 class="modal-title" id="modal-title"></h2>

        <!-- Uploader info & Subscribe button -->
        <div class="modal-uploader-row">
          <div class="modal-uploader">
            <div class="modal-uploader-avatar">
              <img id="modal-uploader-avatar" src="" alt="" loading="lazy" />
            </div>
            <div>
              <p class="modal-uploader-name" id="modal-uploader-name"></p>
              <p class="modal-uploader-sub" id="modal-uploader-subs">Loading subscribers...</p>
            </div>
          </div>
          <button class="subscribe-btn" id="subscribe-btn">Subscribe</button>
        </div>

        <!-- Description -->
        <p class="modal-description" id="modal-description"></p>

        <!-- Stats -->
        <div class="modal-stats">
          <span id="modal-views"></span>
          <span>•</span>
          <span id="modal-time"></span>
        </div>

        <!-- ── Interaction Panel ── -->
        <div class="interaction-panel">

          <!-- Like Button -->
          <button class="action-btn like-btn" id="like-btn" aria-label="Like this image" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span id="like-count">0</span>
          </button>

          <!-- Share Button -->
          <button class="action-btn" id="share-btn" aria-label="Share this image">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/>
              <circle cx="6" cy="12" r="3"/>
              <circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share
          </button>

          <!-- Download Button -->
          <button class="action-btn" id="download-btn" aria-label="Download this image">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>

        </div><!-- /interaction-panel -->

        <!-- ── Comments Section ── -->
        <div class="comments-section">
          <h3 class="comments-title">Comments</h3>

          <!-- Comment input -->
          <div class="comment-input-row">
            <textarea
              class="comment-input"
              id="comment-input"
              placeholder="Add a comment…"
              rows="1"
              aria-label="Write a comment"
            ></textarea>
            <button class="comment-submit-btn" id="comment-submit" aria-label="Post comment">
              Post
            </button>
          </div>

          <!-- Comments list — populated by app.js -->
          <div class="comments-list" id="comments-list" aria-live="polite"></div>
        </div>

      </div><!-- /modal-details-pane -->
    </div><!-- /modal-layout -->
  </div><!-- /modal -->
</div><!-- /detail-modal -->


<!-- ════════════════════════════════════════════════════════════
     UPLOAD MODAL
     ════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop upload-modal" id="upload-modal" role="dialog" aria-modal="true" aria-labelledby="upload-title-heading" aria-hidden="true">
  <div class="modal">
    <!-- Close button -->
    <button class="modal-close" id="close-upload-modal" aria-label="Close upload modal">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div class="upload-modal-header">
      <h2 class="upload-modal-title" id="upload-title-heading">Upload Video</h2>
    </div>
    
    <form class="upload-form" id="upload-form">
      <div class="drop-zone" id="drop-zone" tabindex="0">
        <div id="drop-content">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="40" height="40">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            <line x1="12" y1="12" x2="12" y2="3"/>
          </svg>
          <p>Drag & drop video file or <span>browse</span></p>
        </div>
        <img class="drop-zone-preview" id="drop-preview" src="" alt="Video Preview" />
      </div>
      <input type="file" id="file-input" accept="video/*,image/*" />

      <div class="upload-field">
        <label for="upload-title">Title</label>
        <input type="text" id="upload-title" placeholder="Add a title that describes your video" required />
      </div>

      <div class="upload-field">
        <label for="upload-category">Category</label>
        <select id="upload-category" required>
          <option value="">Select Category</option>
          <option value="Music">Music</option>
          <option value="Gaming">Gaming</option>
          <option value="Tech">Tech</option>
          <option value="Animals">Animals</option>
          <option value="Abstract">Abstract</option>
          <option value="Minimalism">Minimalism</option>
        </select>
      </div>

      <div class="upload-field">
        <label for="upload-desc">Description</label>
        <textarea id="upload-desc" placeholder="Tell viewers about your video" rows="3"></textarea>
      </div>

      <button type="submit" class="upload-submit-btn">Publish</button>
    </form>
  </div>
</div>

<!-- Voice Search Overlay -->
<div class="voice-overlay" id="voice-overlay" aria-hidden="true">
  <div class="voice-overlay-content">
    <div class="pulse-ring">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </div>
    <p class="voice-status" id="voice-status">Listening...</p>
    <button class="voice-close-btn" id="voice-close-btn">&times;</button>
  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     TOAST NOTIFICATION CONTAINER
     Toasts are appended here dynamically by app.js
     ════════════════════════════════════════════════════════════ -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>


<!-- ════════════════════════════════════════════════════════════
     SCRIPTS
     auth.js must come first (defines requireAuth, getCurrentUser, logout)
     app.js comes second (uses those functions at the top of the file)
     ════════════════════════════════════════════════════════════ -->
<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
